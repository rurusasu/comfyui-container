name: Free Disk Space
description: Remove pre-installed tools to free disk space on GitHub Actions runner

runs:
  using: composite
  steps:
    - name: Free disk space
      shell: bash
      run: |
        echo "Before cleanup:"
        df -h /
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
          /usr/local/share/boost /usr/local/graalvm /usr/local/share/chromium \
          /usr/local/lib/node_modules /usr/share/swift || true
        sudo docker image prune -af || true
        echo "After cleanup:"
        df -h /
