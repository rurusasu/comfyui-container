name: Build CPU Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: "ComfyUI version tag (e.g. v0.18.3)"
        required: true
        default: "v0.18.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "comfyui_version=${{ github.event.inputs.comfyui_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "comfyui_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/docker-build-push
        id: docker
        with:
          variant: cpu
          comfyui_version: ${{ steps.version.outputs.comfyui_version }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          load: "true"

      - name: Smoke test
        run: |
          docker run --rm ${{ steps.docker.outputs.image_tag }} \
            python -c "import torch; import comfy; print(f'torch={torch.__version__} comfy=ok')"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "comfyui_version=${{ github.event.inputs.comfyui_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "comfyui_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/docker-build-push
        id: docker
        with:
          variant: cpu
          comfyui_version: ${{ steps.version.outputs.comfyui_version }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          load: "true"

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy image scan
        run: trivy image --format table --severity CRITICAL,HIGH --exit-code 0 ${{ steps.docker.outputs.image_tag }}

  push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "comfyui_version=${{ github.event.inputs.comfyui_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "comfyui_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/docker-build-push
        with:
          variant: cpu
          comfyui_version: ${{ steps.version.outputs.comfyui_version }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          push: "true"
