name: Docker Build and Push
description: Login to Docker Hub, build with Buildx, and push image

inputs:
  variant:
    description: "gpu or cpu"
    required: true
  comfyui_version:
    description: "ComfyUI git tag (e.g. v0.18.3)"
    required: true
  dockerhub_username:
    description: "Docker Hub username"
    required: true
  dockerhub_token:
    description: "Docker Hub access token"
    required: true
  image_name:
    description: "Docker Hub image name"
    required: false
    default: "rurusasu/comfyui-container"
  push:
    description: "Push to registry (true/false)"
    required: false
    default: "false"
  load:
    description: "Load image into local docker (true/false)"
    required: false
    default: "false"

outputs:
  image_tag:
    description: "Full image tag that was built"
    value: ${{ steps.meta.outputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Resolve tag
      id: meta
      shell: bash
      run: |
        VERSION_NUM="${{ inputs.comfyui_version }}"
        VERSION_NUM="${VERSION_NUM#v}"
        TAG="${{ inputs.image_name }}:comfyui-${VERSION_NUM}-base-${{ inputs.variant }}"
        echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        build-args: |
          VARIANT=${{ inputs.variant }}
          COMFYUI_VERSION=${{ inputs.comfyui_version }}
        tags: ${{ steps.meta.outputs.image_tag }}
        cache-from: type=gha,scope=${{ inputs.variant }}
        cache-to: type=gha,mode=max,scope=${{ inputs.variant }}
