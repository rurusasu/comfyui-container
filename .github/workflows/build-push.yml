name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: "ComfyUI version tag (e.g. v0.18.3)"
        required: true
        default: "v0.18.3"

env:
  REGISTRY: docker.io
  IMAGE_NAME: rurusasu/comfyui-container

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [gpu, cpu]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve ComfyUI version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.comfyui_version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          # Strip leading 'v' for tag name
          VERSION_NUM="${VERSION#v}"
          echo "comfyui_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_num=${VERSION_NUM}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VARIANT=${{ matrix.variant }}
            COMFYUI_VERSION=${{ steps.version.outputs.comfyui_version }}
          tags: |
            ${{ env.IMAGE_NAME }}:comfyui-${{ steps.version.outputs.version_num }}-base-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
