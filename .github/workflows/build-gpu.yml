name: Build GPU Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: "ComfyUI version tag (e.g. v0.18.3)"
        required: true
        default: "v0.18.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "comfyui_version=${{ github.event.inputs.comfyui_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "comfyui_version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/docker-build-push
        with:
          variant: gpu
          comfyui_version: ${{ steps.version.outputs.comfyui_version }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
